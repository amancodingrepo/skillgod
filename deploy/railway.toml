[build]
builder = "nixpacks"

[deploy]
startCommand = "uvicorn deploy.api:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[environments.production.deploy]
numReplicas = 1

# ---------------------------------------------------------------------------
# Required environment variables (set these in Railway dashboard)
# ---------------------------------------------------------------------------
# RAZORPAY_KEY_ID          = rzp_live_xxxxxxxxxxxxxxxx
# RAZORPAY_KEY_SECRET      = xxxxxxxxxxxxxxxxxxxxxxxx
# RAZORPAY_WEBHOOK_SECRET  = (from Razorpay dashboard → Webhooks → Secret)
# SMTP_HOST                = smtp.gmail.com
# SMTP_PORT                = 587
# SMTP_USER                = hello@skillgod.dev
# SMTP_PASS                = (Gmail app password or Hostinger SMTP password)
# DATABASE_URL             = (Railway injects this when you add a Postgres plugin)
#
# Optional:
# SKILLGOD_API             = https://api.skillgod.dev  (custom domain for the API)
